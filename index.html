<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funny Cat Viewer</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      overflow: hidden;
      transition: background-color 0.8s ease;
    }

    .image-enter {
      animation: popIn 0.8s ease;
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.8) rotate(-5deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .floating {
      animation: floating 3s ease-in-out infinite;
    }

    @keyframes floating {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }
  </style>
</head>
<body class="w-screen h-screen flex items-center justify-center bg-pink-300">

  <!-- Background bubbles -->
  <div id="bubbles"></div>

  <!-- Main container -->
  <div class="relative w-full h-full flex flex-col items-center justify-center">

    <!-- Cat Image -->
    <img
      id="catImage"
      class="max-w-full max-h-full object-cover rounded-3xl shadow-2xl image-enter floating"
      src=""
      alt="Cute Cat"
    />

    <!-- Button -->
    <button
      id="nextBtn"
      class="absolute bottom-8 px-8 py-4 text-2xl font-bold rounded-full bg-white text-pink-600 shadow-xl hover:scale-110 transition-transform duration-300"
    >
      Next Cat 🐱
    </button>
  </div>

  <script>
    const catImage = document.getElementById("catImage");
    const nextBtn = document.getElementById("nextBtn");

    const colors = [
      "#FFB6C1",
      "#FFD700",
      "#87CEFA",
      "#98FB98",
      "#FFA07A",
      "#DA70D6",
      "#40E0D0",
      "#FF69B4",
      "#F4A460",
      "#7FFFD4"
    ];

    async function loadCat() {
      try {
        // Random background color
        const randomColor =
          colors[Math.floor(Math.random() * colors.length)];

        document.body.style.backgroundColor = randomColor;

        // Animation reset
        catImage.classList.remove("image-enter");

        // Fetch cat image
        const response = await fetch(
          "https://api.thecatapi.com/v1/images/search"
        );

        const data = await response.json();

        // Small delay for smoother animation
        setTimeout(() => {
          catImage.src = data[0].url;
          catImage.classList.add("image-enter");
        }, 100);

      } catch (error) {
        console.error("Failed to load cat image:", error);
      }
    }

    // Floating bubbles for kids
    function createBubble() {
      const bubble = document.createElement("div");

      const size = Math.random() * 60 + 20;

      bubble.style.width = `${size}px`;
      bubble.style.height = `${size}px`;
      bubble.style.left = `${Math.random() * window.innerWidth}px`;

      bubble.className =
        "absolute rounded-full opacity-20 animate-pulse";

      bubble.style.backgroundColor =
        colors[Math.floor(Math.random() * colors.length)];

      bubble.style.top = `${window.innerHeight}px`;

      document.getElementById("bubbles").appendChild(bubble);

      let position = window.innerHeight;

      const interval = setInterval(() => {
        position -= 2;
        bubble.style.top = `${position}px`;

        if (position < -100) {
          clearInterval(interval);
          bubble.remove();
        }
      }, 20);
    }

    // Create bubbles continuously
    setInterval(createBubble, 500);

    // Button click
    nextBtn.addEventListener("click", loadCat);

    // Initial image
    loadCat();
  </script>
</body>
</html>
