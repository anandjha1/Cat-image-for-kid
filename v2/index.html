<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Magical Funny Cat World 🐱✨</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    * {
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      overflow: hidden;
      transition: background 1s ease;
      font-family: "Comic Sans MS", cursive, sans-serif;
    }

    /* Image animation */
    .image-enter {
      animation: popIn 0.7s ease;
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.6) rotate(-8deg);
      }
      70% {
        transform: scale(1.05) rotate(2deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    /* Floating image */
    .floating {
      animation: floating 3s ease-in-out infinite;
    }

    @keyframes floating {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    /* Bubble animation */
    @keyframes bubbleMove {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translateY(-120vh) scale(1.2);
        opacity: 0;
      }
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      animation: bubbleMove linear forwards;
      backdrop-filter: blur(4px);
      box-shadow:
        inset -6px -8px 12px rgba(255,255,255,0.35),
        inset 6px 8px 12px rgba(255,255,255,0.15),
        0 0 20px rgba(255,255,255,0.25);
    }

    /* Sparkle stars */
    .star {
      position: absolute;
      color: white;
      animation: twinkle 2s infinite ease-in-out;
      opacity: 0.7;
    }

    @keyframes twinkle {
      0%, 100% {
        transform: scale(0.7);
        opacity: 0.3;
      }
      50% {
        transform: scale(1.3);
        opacity: 1;
      }
    }

    .glass {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .shine {
      position: relative;
      overflow: hidden;
    }

    .shine::before {
      content: "";
      position: absolute;
      top: -100%;
      left: -100%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
      );
      transform: rotate(25deg);
      animation: shine 5s linear infinite;
    }

    @keyframes shine {
      0% {
        transform: translateX(-100%) rotate(25deg);
      }
      100% {
        transform: translateX(100%) rotate(25deg);
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: white;
      border-radius: 10px;
    }
  </style>
</head>

<body class="w-screen h-screen flex items-center justify-center">

  <!-- Bubbles -->
  <div id="bubbleContainer"></div>

  <!-- Stars -->
  <div id="stars"></div>

  <!-- Main App -->
  <div class="relative w-full h-full flex flex-col items-center justify-center p-4">

    <!-- Top Stats -->
    <div class="absolute top-4 left-4 right-4 flex justify-between items-center z-50">

      <div class="glass rounded-2xl px-5 py-3 text-white shadow-2xl">
        <div class="text-lg font-bold">
          👀 Viewed:
          <span id="viewCount">0</span>
        </div>
      </div>

      <div class="glass rounded-2xl px-5 py-3 text-white shadow-2xl">
        <div class="text-lg font-bold">
          ❤️ Likes:
          <span id="likeCount">0</span>
        </div>
      </div>
    </div>

    <!-- Main Cat Card -->
    <div
      class="relative w-full max-w-3xl flex flex-col items-center"
    >

      <!-- Image -->
      <div class="relative">

        <img
          id="catImage"
          class="max-h-[70vh] rounded-[40px] shadow-2xl object-cover image-enter floating border-[8px] border-white shine"
          src=""
          alt="Cute Cat"
        />

        <!-- Like Button -->
        <button
          id="likeBtn"
          class="absolute top-5 right-5 w-16 h-16 rounded-full bg-white/80 backdrop-blur-lg text-pink-500 text-3xl shadow-xl hover:scale-110 transition-all duration-300"
        >
          🤍
        </button>

      </div>

      <!-- Controls -->
      <div
        class="mt-6 flex flex-wrap gap-4 justify-center"
      >

        <button
          id="prevBtn"
          class="px-6 py-4 rounded-full bg-white text-purple-600 text-xl font-bold shadow-2xl hover:scale-110 transition"
        >
          ⬅ Previous
        </button>

        <button
          id="nextBtn"
          class="px-8 py-4 rounded-full bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400 text-white text-2xl font-bold shadow-2xl hover:scale-110 transition"
        >
          Next Cat 🐱
        </button>

        <button
          id="likedBtn"
          class="px-6 py-4 rounded-full bg-white text-pink-500 text-xl font-bold shadow-2xl hover:scale-110 transition"
        >
          ❤️ Liked Cats
        </button>

      </div>

      <!-- History -->
      <div
        class="glass mt-6 w-full max-w-2xl rounded-3xl p-4 text-white shadow-2xl"
      >
        <div class="text-2xl font-bold mb-3">
          🕘 Recent History
        </div>

        <div
          id="historyContainer"
          class="flex gap-3 overflow-x-auto pb-2"
        ></div>
      </div>

    </div>
  </div>

  <script>
    const catImage = document.getElementById("catImage");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const likeBtn = document.getElementById("likeBtn");
    const likedBtn = document.getElementById("likedBtn");

    const historyContainer =
      document.getElementById("historyContainer");

    const viewCountEl =
      document.getElementById("viewCount");

    const likeCountEl =
      document.getElementById("likeCount");

    // Magical gradient backgrounds
    const gradients = [
      "linear-gradient(135deg,#ff9a9e,#fad0c4)",
      "linear-gradient(135deg,#a18cd1,#fbc2eb)",
      "linear-gradient(135deg,#f6d365,#fda085)",
      "linear-gradient(135deg,#84fab0,#8fd3f4)",
      "linear-gradient(135deg,#fccb90,#d57eeb)",
      "linear-gradient(135deg,#30cfd0,#330867)",
      "linear-gradient(135deg,#667eea,#764ba2)",
      "linear-gradient(135deg,#ff758c,#ff7eb3)",
      "linear-gradient(135deg,#43e97b,#38f9d7)"
    ];

    let history =
      JSON.parse(localStorage.getItem("catHistory")) || [];

    let likes =
      JSON.parse(localStorage.getItem("catLikes")) || [];

    let currentIndex = history.length - 1;

    let viewedCount =
      Number(localStorage.getItem("viewedCount")) || 0;

    viewCountEl.textContent = viewedCount;
    likeCountEl.textContent = likes.length;

    // Change background
    function randomBackground() {
      document.body.style.background =
        gradients[Math.floor(Math.random() * gradients.length)];
    }

    // Save local storage
    function saveData() {
      localStorage.setItem(
        "catHistory",
        JSON.stringify(history)
      );

      localStorage.setItem(
        "catLikes",
        JSON.stringify(likes)
      );

      localStorage.setItem(
        "viewedCount",
        viewedCount
      );
    }

    // Load image
    function showImage(url) {
      catImage.classList.remove("image-enter");

      setTimeout(() => {
        catImage.src = url;
        catImage.classList.add("image-enter");
      }, 100);

      // Like state
      if (likes.includes(url)) {
        likeBtn.innerHTML = "❤️";
      } else {
        likeBtn.innerHTML = "🤍";
      }

      renderHistory();
      randomBackground();
    }

    // Fetch new cat
    async function loadCat() {
      try {
        const response = await fetch(
          "https://api.thecatapi.com/v1/images/search"
        );

        const data = await response.json();

        const url = data[0].url;

        history.push(url);

        currentIndex = history.length - 1;

        viewedCount++;

        viewCountEl.textContent = viewedCount;

        saveData();

        showImage(url);

      } catch (error) {
        console.error(error);
      }
    }

    // Render history
    function renderHistory() {
      historyContainer.innerHTML = "";

      history.slice().reverse().forEach((url) => {
        const img = document.createElement("img");

        img.src = url;

        img.className =
          "w-24 h-24 object-cover rounded-2xl cursor-pointer border-4 border-white shadow-lg hover:scale-110 transition";

        img.onclick = () => {
          showImage(url);
        };

        historyContainer.appendChild(img);
      });
    }

    // Previous
    prevBtn.addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex--;
        showImage(history[currentIndex]);
      }
    });

    // Next
    nextBtn.addEventListener("click", () => {
      if (currentIndex < history.length - 1) {
        currentIndex++;
        showImage(history[currentIndex]);
      } else {
        loadCat();
      }
    });

    // Like button
    likeBtn.addEventListener("click", () => {
      const url = catImage.src;

      if (!likes.includes(url)) {
        likes.push(url);
        likeBtn.innerHTML = "❤️";
      } else {
        likes = likes.filter((item) => item !== url);
        likeBtn.innerHTML = "🤍";
      }

      likeCountEl.textContent = likes.length;

      saveData();
    });

    // Show liked cats
    likedBtn.addEventListener("click", () => {
      if (likes.length === 0) {
        alert("No liked cats yet 😺");
        return;
      }

      historyContainer.innerHTML = "";

      likes.slice().reverse().forEach((url) => {
        const img = document.createElement("img");

        img.src = url;

        img.className =
          "w-24 h-24 object-cover rounded-2xl cursor-pointer border-4 border-pink-300 shadow-lg hover:scale-110 transition";

        img.onclick = () => {
          showImage(url);
        };

        historyContainer.appendChild(img);
      });
    });

    // Create magical shiny bubbles
    function createBubble() {
      const bubble = document.createElement("div");

      const size = Math.random() * 80 + 20;

      bubble.className = "bubble";

      bubble.style.width = `${size}px`;
      bubble.style.height = `${size}px`;

      bubble.style.left =
        `${Math.random() * window.innerWidth}px`;

      bubble.style.bottom = "-100px";

      const colors = [
        "rgba(255,255,255,0.25)",
        "rgba(255,182,193,0.35)",
        "rgba(173,216,230,0.35)",
        "rgba(255,255,0,0.25)",
        "rgba(221,160,221,0.35)",
        "rgba(144,238,144,0.35)",
        "rgba(255,105,180,0.30)"
      ];

      bubble.style.background =
        colors[Math.floor(Math.random() * colors.length)];

      bubble.style.animationDuration =
        `${Math.random() * 8 + 6}s`;

      document
        .getElementById("bubbleContainer")
        .appendChild(bubble);

      setTimeout(() => {
        bubble.remove();
      }, 14000);
    }

    // Sparkle stars
    function createStars() {
      const container = document.getElementById("stars");

      for (let i = 0; i < 40; i++) {
        const star = document.createElement("div");

        star.className = "star";

        star.innerHTML = "✨";

        star.style.left =
          `${Math.random() * window.innerWidth}px`;

        star.style.top =
          `${Math.random() * window.innerHeight}px`;

        star.style.fontSize =
          `${Math.random() * 18 + 8}px`;

        star.style.animationDuration =
          `${Math.random() * 3 + 2}s`;

        container.appendChild(star);
      }
    }

    // Bubble generator
    setInterval(createBubble, 300);

    createStars();

    // First image
    if (history.length > 0) {
      showImage(history[currentIndex]);
    } else {
      loadCat();
    }
  </script>
</body>
</html>
